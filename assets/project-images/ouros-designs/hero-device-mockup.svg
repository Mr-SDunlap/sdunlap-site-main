<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="hero-bg" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c1015"/>
      <stop offset="40%" stop-color="#13191e"/>
      <stop offset="100%" stop-color="#1a2230"/>
    </linearGradient>
    <linearGradient id="screen-shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="device-shadow">
      <feDropShadow dx="0" dy="20" stdDeviation="40" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="80" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
      </feMerge>
    </filter>
    <clipPath id="screen-clip">
      <rect x="520" y="195" width="1060" height="662" rx="2"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#hero-bg)"/>

  <!-- Subtle ambient glow behind device -->
  <ellipse cx="1050" cy="500" rx="600" ry="350" fill="#ff611a" opacity="0.03" filter="url(#soft-glow)"/>

  <!-- Subtle grid -->
  <g opacity="0.025" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="180" x2="1920" y2="180"/>
    <line x1="0" y1="360" x2="1920" y2="360"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="0" y1="720" x2="1920" y2="720"/>
    <line x1="0" y1="900" x2="1920" y2="900"/>
    <line x1="480" y1="0" x2="480" y2="1080"/>
    <line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1440" y1="0" x2="1440" y2="1080"/>
  </g>

  <!-- LAPTOP DEVICE -->
  <g filter="url(#device-shadow)">
    <!-- Screen bezel -->
    <rect x="500" y="150" width="1100" height="730" rx="12" fill="#1c1c1e"/>

    <!-- Inner bezel border -->
    <rect x="510" y="160" width="1080" height="710" rx="8" fill="#2a2a2c" stroke="#3a3a3c" stroke-width="1"/>

    <!-- Browser chrome bar -->
    <rect x="518" y="168" width="1064" height="28" rx="4" fill="#2a2a2c"/>

    <!-- Traffic lights -->
    <circle cx="536" cy="182" r="5" fill="#ff5f57"/>
    <circle cx="554" cy="182" r="5" fill="#febc2e"/>
    <circle cx="572" cy="182" r="5" fill="#28c840"/>

    <!-- URL bar -->
    <rect x="620" y="174" width="380" height="16" rx="4" fill="#1c1c1e"/>
    <text x="635" y="186" font-family="'SF Mono', 'Menlo', monospace" font-size="9" fill="#8a9396" letter-spacing="0.02em">ourosdesigns.com</text>

    <!-- Screen area with screenshot -->
    <g clip-path="url(#screen-clip)">
      <image href="hero-homepage.png" x="520" y="195" width="1060" height="662" preserveAspectRatio="xMidYMin slice"/>
    </g>

    <!-- Screen reflection -->
    <rect x="520" y="195" width="1060" height="662" fill="url(#screen-shine)" rx="2"/>

    <!-- Laptop base -->
    <path d="M420 880 L500 880 L500 882 L1600 882 L1600 880 L1680 880 L1620 910 Q1610 916 1596 916 L504 916 Q490 916 480 910 Z" fill="#2a2a2c" stroke="#3a3a3c" stroke-width="0.5"/>

    <!-- Base hinge line -->
    <rect x="500" y="878" width="1100" height="4" rx="1" fill="#1c1c1e"/>

    <!-- Trackpad indent on base -->
    <rect x="910" y="890" width="280" height="4" rx="2" fill="#222" opacity="0.5"/>
  </g>

  <!-- Decorative elements -->
  <!-- Corner brackets -->
  <g stroke="#ff611a" stroke-width="1" opacity="0.15" fill="none">
    <path d="M80 80 L80 120 M80 80 L120 80"/>
    <path d="M1840 80 L1840 120 M1840 80 L1800 80"/>
    <path d="M80 1000 L80 960 M80 1000 L120 1000"/>
    <path d="M1840 1000 L1840 960 M1840 1000 L1800 1000"/>
  </g>
</svg>